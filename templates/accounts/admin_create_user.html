{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Регистрация на служител - AluPVC System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="bi bi-person-plus"></i> Създаване на нов профил (Управител)
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    {{ form|crispy }}

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Създай профил</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3 bg-light">
                <a href="{% url 'home' %}" class="text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Назад към началото
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

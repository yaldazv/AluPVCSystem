{% extends 'base.html' %}

{% block title %}Системна грешка - 500{% endblock %}

{% block content %}
<div class="container fade-in">
    <div class="row justify-content-center mt-5">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg border-danger">
                <div class="card-body py-5">
                    <i class="bi bi-x-octagon-fill text-danger" style="font-size: 6rem;"></i>
                    <h1 class="display-1 fw-bold text-danger mt-3">500</h1>
                    <h2 class="mb-4" style="color: #2c3e50;">Вътрешна грешка на сървъра</h2>
                    <p class="lead text-muted mb-4">
                        Опа! Нещо се обърка от наша страна. Нашите технически специалисти вече са уведомени.
                    </p>
                    <div class="mt-4">
                        <a href="{% url 'home' %}" class="btn btn-primary btn-lg me-2">
                            <i class="bi bi-house-door"></i> Към началото
                        </a>
                        <button onclick="window.history.back()" class="btn btn-outline-secondary btn-lg">
                            <i class="bi bi-arrow-left"></i> Върни се назад
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

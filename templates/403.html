{% extends 'base.html' %}

{% block title %}Достъпът е забранен - 403{% endblock %}

{% block content %}
<div class="container fade-in">
    <div class="row justify-content-center mt-5">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg border-warning">
                <div class="card-body py-5">
                    <i class="bi bi-shield-lock-fill text-warning" style="font-size: 6rem;"></i>
                    <h1 class="display-1 fw-bold text-warning mt-3">403</h1>
                    <h2 class="mb-4" style="color: #2c3e50;">Достъпът е ограничен</h2>
                    <p class="lead text-muted mb-4">
                        Нямате необходимите права (роля), за да прегледате тази страница или да извършите това действие.
                    </p>
                    <div class="mt-4">
                        <a href="{% url 'home' %}" class="btn btn-primary btn-lg me-2">
                            <i class="bi bi-house-door"></i> Към началото
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
